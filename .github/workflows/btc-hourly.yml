name: BTC hourly to Discord

on:
  schedule:
    - cron: "0 * * * *"   # hourly at minute 0 (UTC)
  workflow_dispatch:       # allow manual run

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post BTC price to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "Missing DISCORD_WEBHOOK_URL secret" >&2
            exit 1
          fi
          # Build JSON payload with Python, then POST to Discord
          python3 - <<'PY' | curl -fsS -X POST -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"
import json, urllib.request, datetime, ssl
ctx = ssl.create_default_context()
with urllib.request.urlopen("https://api.coinbase.com/v2/prices/BTC-USD/spot", context=ctx, timeout=10) as resp:
    data = json.load(resp)
price = float(data["data"]["amount"])
now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
content = f"BTC price: ${price:,.2f} ({now})"
print(json.dumps({"content": content}))
PY
