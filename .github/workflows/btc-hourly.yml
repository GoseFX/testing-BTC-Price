name: BTC hourly to Discord

on:
  schedule:
    - cron: "0 * * * *"   # hourly at minute 0 (UTC)
  workflow_dispatch:       # allow manual run

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post BTC price to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "Missing DISCORD_WEBHOOK_URL secret" >&2
            exit 1
          fi
          PRICE=$(curl -fsS https://api.coinbase.com/v2/prices/BTC-USD/spot | jq -r '.data.amount')
          if [ -z "$PRICE" ] || [ "$PRICE" = "null" ]; then
            echo "Failed to fetch BTC price" >&2
            exit 1
          fi
          NOW=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          jq -n --arg price "$PRICE" --arg time "$NOW" \
            '{content: ("BTC price: $" + $price + " (" + $time + ")")}' \
          | curl -fsS -X POST -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"
